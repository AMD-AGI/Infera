# Production InferaDeployment for the GAIE (Gateway API Inference Extension)
# path, with disaggregated prefill/decode over RoCE RDMA (mori). Parameterized
# with ${VAR} placeholders rendered by `envsubst` (see
# deploy/scripts/deploy-k8s.sh `INSTALL_GAIE=true`, or render manually:
#
#   export GAIE_NAME=llama3-70b GAIE_IMAGE=registry/infera-sglang:1.0 \
#          GAIE_MODEL=RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic \
#          GAIE_TOKENIZER=RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic \
#          GAIE_GATEWAY_NAME=inference-gateway GAIE_GATEWAY_NAMESPACE=infra \
#          GAIE_PREFILL_REPLICAS=2 GAIE_DECODE_REPLICAS=4 GAIE_GPUS=1 GAIE_TP_SIZE=1 \
#          GAIE_IB_DEVICE=rdma0 GAIE_HCA_LIST=rdma0,rdma1 GAIE_GID_INDEX=3
#   envsubst < deploy/manifests/gaie-inferadeployment.yaml | kubectl apply -n prod -f -
#
# The operator injects a `infera.server --router-mode direct` frontend sidecar
# into each worker pod, deploys the Endpoint Picker (EPP), and wires an
# InferencePool + HTTPRoute onto the existing Gateway named ${GAIE_GATEWAY_NAME}.
#
# GAIE_TOKENIZER / GAIE_MODEL must be an HF id (the EPP + injected sidecar fetch
# the tokenizer over the network; they do not mount a model volume). The worker
# engine loads the same id via --model-path.
#
# RDMA (mori) notes — the prefill/decode pools use extraPodSpec so they can carry
# the RDMA pod-level settings the flat fields cannot:
#   - hostNetwork so mori can use the routable RDMA-rail subnet (pod-overlay IPs
#     often cannot reach the RoCE v2 GIDs). Drop it if your CNI exposes the rail.
#   - GAIE_GID_INDEX must be the RoCE v2 IPv4 GID index (check `show_gids <dev>`);
#     the wrong index makes the KV transfer time out.
#   - request the rdma/hca extended resource + IPC_LOCK/SYS_PTRACE/SYS_RESOURCE.
#
# Prerequisites: infera-operator installed (deploy/scripts/deploy-k8s.sh), Gateway API +
# GAIE CRDs and the Gateway present, AMD GPUs (amd.com/gpu) + rdma/hca, a pullable
# engine image, and (for a private registry) an imagePullSecret attached to the
# target namespace's default ServiceAccount.
apiVersion: infera.amd.com/v1alpha1
kind: InferaDeployment
metadata:
  name: ${GAIE_NAME}
  labels:
    app.kubernetes.io/part-of: infera
    app.kubernetes.io/component: inference
spec:
  backendFramework: ${GAIE_BACKEND}
  image: ${GAIE_IMAGE}
  discoveryBackend: kubernetes
  nats:
    deploy: false
  gaie:
    enabled: true
    tokenizerPath: ${GAIE_TOKENIZER}
    gatewayName: ${GAIE_GATEWAY_NAME}
    gatewayNamespace: ${GAIE_GATEWAY_NAMESPACE}
    frontendPort: 8000
    modelName: ${GAIE_MODEL}
  services:
    prefill:
      componentType: worker
      role: prefill
      replicas: ${GAIE_PREFILL_REPLICAS}
      numberOfNodes: 1
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    infera.amd.com/deployment: ${GAIE_NAME}
                topologyKey: kubernetes.io/hostname
        containers:
          - name: main
            image: ${GAIE_IMAGE}
            imagePullPolicy: IfNotPresent
            command: ["python3","-m","infera.engine.sglang","--host","0.0.0.0","--port","30000",
                      "--disaggregation-mode","prefill",
                      "--model-path","${GAIE_MODEL}",
                      "--served-model-name","${GAIE_MODEL}",
                      "--tp-size","${GAIE_TP_SIZE}","--attention-backend","aiter","--trust-remote-code",
                      "--mem-fraction-static","0.8",
                      "--kv-event-transport","zmq","--request-transport","http",
                      "--disaggregation-transfer-backend","mori",
                      "--disaggregation-ib-device","${GAIE_IB_DEVICE}"]
            env:
              - {name: SGLANG_USE_AITER, value: "1"}
              - {name: NCCL_IB_HCA, value: "${GAIE_HCA_LIST}"}
              - {name: MC_GID_INDEX, value: "${GAIE_GID_INDEX}"}
              - {name: MORI_IB_GID_INDEX, value: "${GAIE_GID_INDEX}"}
              - {name: NCCL_IB_GID_INDEX, value: "${GAIE_GID_INDEX}"}
              - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
              - {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}
              - {name: POD_IP, valueFrom: {fieldRef: {fieldPath: status.podIP}}}
            securityContext:
              capabilities:
                add: ["IPC_LOCK","SYS_PTRACE","SYS_RESOURCE"]
            resources:
              requests: {cpu: "16", memory: "${GAIE_MEMORY}", amd.com/gpu: "${GAIE_GPUS}", rdma/hca: 1}
              limits: {cpu: "16", memory: "${GAIE_MEMORY}", amd.com/gpu: "${GAIE_GPUS}", rdma/hca: 1}
            volumeMounts:
              - {name: dshm, mountPath: /dev/shm}
        volumes:
          - {name: dshm, emptyDir: {medium: Memory, sizeLimit: "${GAIE_SHM}"}}
    decode:
      componentType: worker
      role: decode
      replicas: ${GAIE_DECODE_REPLICAS}
      numberOfNodes: 1
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    infera.amd.com/deployment: ${GAIE_NAME}
                topologyKey: kubernetes.io/hostname
        containers:
          - name: main
            image: ${GAIE_IMAGE}
            imagePullPolicy: IfNotPresent
            command: ["python3","-m","infera.engine.sglang","--host","0.0.0.0","--port","30000",
                      "--disaggregation-mode","decode",
                      "--model-path","${GAIE_MODEL}",
                      "--served-model-name","${GAIE_MODEL}",
                      "--tp-size","${GAIE_TP_SIZE}","--attention-backend","aiter","--trust-remote-code",
                      "--mem-fraction-static","0.8",
                      "--kv-event-transport","zmq","--request-transport","http",
                      "--disaggregation-transfer-backend","mori",
                      "--disaggregation-ib-device","${GAIE_IB_DEVICE}"]
            env:
              - {name: SGLANG_USE_AITER, value: "1"}
              - {name: NCCL_IB_HCA, value: "${GAIE_HCA_LIST}"}
              - {name: MC_GID_INDEX, value: "${GAIE_GID_INDEX}"}
              - {name: MORI_IB_GID_INDEX, value: "${GAIE_GID_INDEX}"}
              - {name: NCCL_IB_GID_INDEX, value: "${GAIE_GID_INDEX}"}
              - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
              - {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}
              - {name: POD_IP, valueFrom: {fieldRef: {fieldPath: status.podIP}}}
            securityContext:
              capabilities:
                add: ["IPC_LOCK","SYS_PTRACE","SYS_RESOURCE"]
            resources:
              requests: {cpu: "16", memory: "${GAIE_MEMORY}", amd.com/gpu: "${GAIE_GPUS}", rdma/hca: 1}
              limits: {cpu: "16", memory: "${GAIE_MEMORY}", amd.com/gpu: "${GAIE_GPUS}", rdma/hca: 1}
            volumeMounts:
              - {name: dshm, mountPath: /dev/shm}
        volumes:
          - {name: dshm, emptyDir: {medium: Memory, sizeLimit: "${GAIE_SHM}"}}

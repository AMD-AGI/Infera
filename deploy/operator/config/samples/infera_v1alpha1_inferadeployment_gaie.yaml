# Example: PD-disaggregated SGLang deployment fronted by a Kubernetes
# Inference Gateway (GAIE). No standalone `server` service is needed — the
# operator injects a `infera.server --router-mode direct` frontend sidecar
# into each worker pod, deploys an Endpoint Picker (EPP), and creates an
# InferencePool + HTTPRoute attaching to an existing `inference-gateway`.
#
# Request flow:
#   client -> inference-gateway -> EPP (picks decode + prefill workers, sets
#   x-worker-instance-id / x-prefill-instance-id) -> worker pod frontend sidecar
#   (--router-mode direct) -> local engine (+ remote prefill for PD).
#
# Prereqs: Gateway API + GAIE CRDs and a Gateway named `inference-gateway`
# installed in the gateway namespace (see the GAIE / kGateway setup docs).
apiVersion: infera.amd.com/v1alpha1
kind: InferaDeployment
metadata:
  name: demo-gaie
spec:
  backendFramework: sglang
  image: infera/engine-sglang-mi300x:dev
  discoveryBackend: kubernetes
  nats:
    deploy: true
    storageSize: 4Gi
  gaie:
    enabled: true
    tokenizerPath: Qwen/Qwen3-0.6B     # must match the workers' tokenizer
    gatewayName: inference-gateway      # existing Gateway to attach the route to
    gatewayNamespace: my-model          # namespace where the Gateway lives
    frontendPort: 8000                  # injected sidecar port = InferencePool target
    modelName: Qwen/Qwen3-0.6B
    # hostnames: ["llama3-70b-disagg.example.com"]   # optional HTTPRoute hosts
  services:
    prefill:
      componentType: worker
      role: prefill
      replicas: 1
      numberOfNodes: 1
      resources: {gpu: 1, gpuType: amd.com/gpu, memory: 64Gi, sharedMemory: 32Gi}
      args: ["--model-path", "Qwen/Qwen3-0.6B", "--tp-size", "1", "--trust-remote-code",
             "--enable-kv-events", "--disaggregation-transfer-backend", "mori",
             "--disaggregation-ib-device", "rdma0"]
    decode:
      componentType: worker
      role: decode
      replicas: 1
      numberOfNodes: 1
      resources: {gpu: 1, gpuType: amd.com/gpu, memory: 64Gi, sharedMemory: 32Gi}
      args: ["--model-path", "Qwen/Qwen3-0.6B", "--tp-size", "1", "--trust-remote-code",
             "--enable-kv-events", "--disaggregation-transfer-backend", "mori",
             "--disaggregation-ib-device", "rdma0"]

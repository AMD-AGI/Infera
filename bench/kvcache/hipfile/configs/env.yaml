# Bench 0 / Bench 1 hipFile environment pins.
#
# hipFile environment requirements. Keep these pins current when versions
# change — pin drift is a Bench 0 root-cause anti-pattern (silent compat mode).

required:
  rocm_version: "7.2.0"
  gpu_arch: "gfx950"          # MI355X
  hipfile_source: "github.com/ROCm/rocm-systems projects/hipfile"
  build_script: "deploy/docker/scripts/build_hipfile.sh"  # commit 645be85 onward
  cmake_flags:
    - "-DCMAKE_HIP_PLATFORM=amd"
    - "-DCMAKE_INSTALL_PREFIX=/opt/rocm"
    - "-DAIS_INSTALL_EXAMPLES=ON"
    - "-DAIS_INSTALL_TOOLS=ON"             # ships ais-check, which Bench 0 calls
    - "-DCMAKE_BUILD_TYPE=Release"
  binaries:
    - /opt/rocm/lib/libhipfile.so
    - /opt/rocm/bin/ais-check              # P2PDMA liveness probe
  kernel:
    hmm: enabled
    iommu_passthrough_for_nvme: true
  filesystem: ext4 | xfs                   # NFS is out of scope here.

testbed_nodes:
  primary: <primary-node>
  alternates: [<alt-node-1>, <alt-node-2>]

blocked_combinations:
  # See project_mi355x_pensando_ionic_rdma — ionic_rdma kernel + libibverbs
  # ABI mismatch on these boxes silently downgrades RDMA paths to compat;
  # we'd be measuring NIC fallback bandwidth, not hipFile. Run Bench 0
  # only when NVMe sits on a non-ionic PCIe controller.
  - "Pensando ionic in the PCIe path between NVMe and GPU"

  # NFS-as-L3 is a separate concern; buffered vs O_DIRECT inverts on Weka
  # and breaks hipFile's assumptions. Use local NVMe paths only.
  - "NFS-mounted target paths (out of scope for hipFile)"

  # Consumer-tier NVMe silently drops to hipFile
  # compat mode. The build_hipfile.sh probe and Bench 0's ais-check call
  # are the gate; if Kernel P2PDMA support: False, do not record numbers.
  - "Consumer NVMe SKUs without documented hipFile compatibility"

  # ROCm < 6.2 is out of scope. Bench 0 itself doesn't gate the runtime
  # version (we trust the build image), but if you skinny-up the test box,
  # install ROCm 7.2.0.
  - "ROCm < 6.2 (use the lmsysorg engine image plus build_hipfile.sh)"

bench0_invocation:
  # Reference command line for ad-hoc runs; not exercised by CI.
  build_first: "bash deploy/docker/scripts/build_hipfile.sh"
  command: |
    python -m bench.kvcache.hipfile.bench0_sanity \
      --path /tmp/hipfile-test \
      --path /mnt/<nfs-mount>/hipfile-test \
      --require-p2pdma

  expected_runtime_minutes: 1   # 64 MiB pre-seed + 4 sizes × 2 concs × 5 reps

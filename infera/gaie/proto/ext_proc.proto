// Minimal, wire-compatible subset of Envoy's external processing (ext_proc) v3
// API. Field numbers and types match the upstream definition
// (envoy/service/ext_proc/v3/external_processor.proto) so an Envoy-based
// gateway (kGateway) can talk to this server, but the heavy transitive
// dependency tree (xds / udpa / validate / envoy core) is dropped: we declare
// only the messages and fields this EPP reads (request headers/body) or writes
// (header mutations on the response). Unknown fields the gateway sends are
// preserved/ignored by proto3 decoding.
//
// The dependent core types (HeaderMap / HeaderValue / HeaderValueOption) are
// re-declared locally; wire compatibility depends only on field numbers and
// types, not on the message's package or name.
syntax = "proto3";

package envoy.service.ext_proc.v3;

// ---- envoy.config.core.v3 subset (field layout must match upstream) ----

message HeaderValue {
  string key = 1;
  string value = 2;
  bytes raw_value = 3;
}

enum HeaderAppendAction {
  APPEND_IF_EXISTS_OR_ADD = 0;
  ADD_IF_ABSENT = 1;
  OVERWRITE_IF_EXISTS_OR_ADD = 2;
  OVERWRITE_IF_EXISTS = 3;
}

message HeaderValueOption {
  HeaderValue header = 1;
  HeaderAppendAction append_action = 3;
  bool keep_empty_value = 4;
}

message HeaderMap {
  repeated HeaderValue headers = 1;
}

// ---- ext_proc request messages (server reads) ----

message HttpHeaders {
  HeaderMap headers = 1;
  bool end_of_stream = 3;
}

message HttpBody {
  bytes body = 1;
  bool end_of_stream = 2;
}

message HttpTrailers {
  HeaderMap trailers = 1;
}

message ProcessingRequest {
  oneof request {
    HttpHeaders request_headers = 2;
    HttpHeaders response_headers = 3;
    HttpBody request_body = 4;
    HttpBody response_body = 5;
    HttpTrailers request_trailers = 6;
    HttpTrailers response_trailers = 7;
  }
}

// ---- ext_proc response messages (server writes) ----

message HeaderMutation {
  repeated HeaderValueOption set_headers = 1;
  repeated string remove_headers = 2;
}

// FULL_DUPLEX_STREAMED body response: the server streams the (possibly
// unmodified) body back to Envoy chunk by chunk. ``end_of_stream`` marks the
// final chunk. Field layout matches upstream StreamedBodyResponse.
message StreamedBodyResponse {
  bytes body = 1;
  bool end_of_stream = 2;
}

message BodyMutation {
  oneof mutation {
    bytes body = 1;
    bool clear_body = 2;
    StreamedBodyResponse streamed_response = 3;
  }
}

message CommonResponse {
  enum ResponseStatus {
    CONTINUE = 0;
    CONTINUE_AND_REPLACE = 1;
  }
  ResponseStatus status = 1;
  HeaderMutation header_mutation = 2;
  BodyMutation body_mutation = 3;
  bool clear_route_cache = 5;
}

message HeadersResponse {
  CommonResponse response = 1;
}

message BodyResponse {
  CommonResponse response = 1;
}

message TrailersResponse {
  HeaderMutation header_mutation = 1;
}

message ProcessingResponse {
  oneof response {
    HeadersResponse request_headers = 1;
    HeadersResponse response_headers = 2;
    BodyResponse request_body = 3;
    BodyResponse response_body = 4;
    TrailersResponse request_trailers = 5;
    TrailersResponse response_trailers = 6;
  }
}

service ExternalProcessor {
  rpc Process(stream ProcessingRequest) returns (stream ProcessingResponse) {}
}

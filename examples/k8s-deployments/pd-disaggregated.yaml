# Disaggregated PD: 1 router + 1 prefill pool + 1 decode pool (tp=1, 1 GPU each).
# KV is transferred engine<->engine over RoCE RDMA (mori backend).
#
# Fill in the <PLACEHOLDERS> for your cluster:
#   <NAMESPACE>          target namespace (must exist)
#   <ENGINE_IMAGE>       infera engine image your nodes can pull
#   <IMAGE_PULL_SECRET>  docker-registry secret in <NAMESPACE> for that image
#   <MODEL_PVC>          PVC (in <NAMESPACE>) that mounts your model store
#   <MODEL_PATH>         path to the model dir as seen INSIDE the pod
#   <RDMA_IB_DEVICE>     RoCE device for mori (one name, e.g. from `ibv_devices`)
#   <RDMA_HCA_LIST>      comma-separated RoCE devices for NCCL_IB_HCA
#   <ROCE_V2_GID_INDEX>  the gid index whose type is "RoCE v2" AND is an IPv4
#                        GID (check `show_gids <dev>`). infera pins the KV host
#                        IP to this rail; the wrong index sends KV over the wrong
#                        interface and the transfer times out.
#
# RDMA requirements for the worker pods (mori needs a real RoCE/IB device):
#   - request the rdma/hca extended resource (RDMA device-plugin injects the NICs)
#   - securityContext capabilities IPC_LOCK + SYS_PTRACE/RESOURCE
#   - hostNetwork so the pods can use the routable RDMA-rail subnet; on many
#     clusters the RoCE GIDs live on host NICs that pod-overlay IPs cannot reach.
#     If your CNI already exposes the RDMA rail to pods, you may drop hostNetwork.
apiVersion: infera.amd.com/v1alpha1
kind: InferaDeployment
metadata:
  name: qwen-pd
  namespace: <NAMESPACE>
spec:
  backendFramework: sglang
  discoveryBackend: kubernetes
  nats:
    deploy: false
  services:
    server:
      componentType: server
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        imagePullSecrets:
          - name: <IMAGE_PULL_SECRET>
        containers:
          - name: main
            image: <ENGINE_IMAGE>
            imagePullPolicy: IfNotPresent
            command: ["python3","-m","infera.server","--host","0.0.0.0","--port","8000",
                      "--router-tokenizer-path","<MODEL_PATH>",
                      "--request-transport","http","--kv-event-transport","zmq"]
            env:
              - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
              - {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}
              - {name: POD_IP, valueFrom: {fieldRef: {fieldPath: status.podIP}}}
            resources:
              requests: {cpu: "4", memory: 16Gi}
              limits: {cpu: "4", memory: 16Gi}
            volumeMounts:
              - {name: model, mountPath: /models, readOnly: true}
        volumes:
          - {name: model, persistentVolumeClaim: {claimName: <MODEL_PVC>}}
    prefill:
      componentType: worker
      role: prefill
      replicas: 1
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        imagePullSecrets:
          - name: <IMAGE_PULL_SECRET>
        affinity:
          # Spread prefill/decode across distinct nodes so KV really crosses the fabric.
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    infera.amd.com/deployment: qwen-pd
                topologyKey: kubernetes.io/hostname
        containers:
          - name: main
            image: <ENGINE_IMAGE>
            imagePullPolicy: IfNotPresent
            command: ["python3","-m","infera.engine.sglang","--host","0.0.0.0","--port","30000",
                      "--disaggregation-mode","prefill",
                      "--model-path","<MODEL_PATH>",
                      "--tp-size","1","--attention-backend","aiter","--trust-remote-code",
                      "--mem-fraction-static","0.8",
                      "--kv-event-transport","zmq","--request-transport","http",
                      "--disaggregation-transfer-backend","mori",
                      "--disaggregation-ib-device","<RDMA_IB_DEVICE>"]
            env:
              - {name: SGLANG_USE_AITER, value: "1"}
              - {name: NCCL_IB_HCA, value: "<RDMA_HCA_LIST>"}
              - {name: MC_GID_INDEX, value: "<ROCE_V2_GID_INDEX>"}
              - {name: MORI_IB_GID_INDEX, value: "<ROCE_V2_GID_INDEX>"}
              - {name: NCCL_IB_GID_INDEX, value: "<ROCE_V2_GID_INDEX>"}
              - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
              - {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}
              - {name: POD_IP, valueFrom: {fieldRef: {fieldPath: status.podIP}}}
            securityContext:
              capabilities:
                add: ["IPC_LOCK","SYS_PTRACE","SYS_RESOURCE"]
            resources:
              requests: {cpu: "16", memory: 64Gi, amd.com/gpu: 1, rdma/hca: 1}
              limits: {cpu: "16", memory: 64Gi, amd.com/gpu: 1, rdma/hca: 1}
            volumeMounts:
              - {name: model, mountPath: /models, readOnly: true}
              - {name: dshm, mountPath: /dev/shm}
        volumes:
          - {name: model, persistentVolumeClaim: {claimName: <MODEL_PVC>}}
          - {name: dshm, emptyDir: {medium: Memory, sizeLimit: 32Gi}}
    decode:
      componentType: worker
      role: decode
      replicas: 1
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        imagePullSecrets:
          - name: <IMAGE_PULL_SECRET>
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    infera.amd.com/deployment: qwen-pd
                topologyKey: kubernetes.io/hostname
        containers:
          - name: main
            image: <ENGINE_IMAGE>
            imagePullPolicy: IfNotPresent
            command: ["python3","-m","infera.engine.sglang","--host","0.0.0.0","--port","30000",
                      "--disaggregation-mode","decode",
                      "--model-path","<MODEL_PATH>",
                      "--tp-size","1","--attention-backend","aiter","--trust-remote-code",
                      "--mem-fraction-static","0.8",
                      "--kv-event-transport","zmq","--request-transport","http",
                      "--disaggregation-transfer-backend","mori",
                      "--disaggregation-ib-device","<RDMA_IB_DEVICE>"]
            env:
              - {name: SGLANG_USE_AITER, value: "1"}
              - {name: NCCL_IB_HCA, value: "<RDMA_HCA_LIST>"}
              - {name: MC_GID_INDEX, value: "<ROCE_V2_GID_INDEX>"}
              - {name: MORI_IB_GID_INDEX, value: "<ROCE_V2_GID_INDEX>"}
              - {name: NCCL_IB_GID_INDEX, value: "<ROCE_V2_GID_INDEX>"}
              - {name: POD_NAME, valueFrom: {fieldRef: {fieldPath: metadata.name}}}
              - {name: POD_NAMESPACE, valueFrom: {fieldRef: {fieldPath: metadata.namespace}}}
              - {name: POD_IP, valueFrom: {fieldRef: {fieldPath: status.podIP}}}
            securityContext:
              capabilities:
                add: ["IPC_LOCK","SYS_PTRACE","SYS_RESOURCE"]
            resources:
              requests: {cpu: "16", memory: 64Gi, amd.com/gpu: 1, rdma/hca: 1}
              limits: {cpu: "16", memory: 64Gi, amd.com/gpu: 1, rdma/hca: 1}
            volumeMounts:
              - {name: model, mountPath: /models, readOnly: true}
              - {name: dshm, mountPath: /dev/shm}
        volumes:
          - {name: model, persistentVolumeClaim: {claimName: <MODEL_PVC>}}
          - {name: dshm, emptyDir: {medium: Memory, sizeLimit: 32Gi}}
